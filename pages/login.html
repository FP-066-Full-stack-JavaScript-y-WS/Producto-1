<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Plataforma Empleo</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>

<body class="bg-auth">
  <main class="container-fluid min-vh-100 d-flex align-items-center justify-content-center py-4">
    <section class="auth-login-wrapper bg-white shadow-sm overflow-hidden">
      <div class="row g-0 min-vh-50">
        <div class="col-lg-6 d-flex align-items-center">
          <div class="w-100 p-4 p-md-5">
            <div class="text-center text-lg-start mb-4">
              <div class="auth-logo mx-auto mx-lg-0 mb-3"></div>
              <h1 class="h2 fw-bold mb-2">Plataforma Empleo</h1>
              <p class="text-muted mb-0">Accede a tu cuenta para continuar</p>
            </div>

            <h2 class="h5 fw-bold mb-4 text-center text-lg-start">Iniciar sesión</h2>

            <form id="loginForm" novalidate>
              <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input
                  type="email"
                  id="email"
                  class="form-control auth-input"
                  placeholder="ejemplo@email.com"
                >
              </div>

              <div class="mb-3">
                <label for="password" class="form-label">Contraseña</label>
                <input
                  type="password"
                  id="password"
                  class="form-control auth-input"
                  placeholder="Introduce tu contraseña"
                >
              </div>

              <div id="loginMensaje" class="mb-3"></div>

              <button type="submit" class="btn btn-auth-gradient w-100 mb-3">
                Acceder
              </button>

              <p class="text-center mb-0 small">
                ¿No tienes cuenta?
                <a href="./register.html" class="text-decoration-none auth-link fw-semibold">Crear cuenta</a>
              </p>
            </form>
            <div class="card mt-4 border-0 bg-light small">
            <div class="card-body py-3">
              <p class="fw-semibold mb-2 text-muted">Usuarios de prueba</p>
                <ul class="list-unstyled mb-0" id="usuarios-prueba"></ul>
                <template id="usuario-template">
                    <li class="mb-1">
                      <strong class="usuario-email"></strong>
                    <span class="text-muted usuario-password"></span>
                   </li>
                </template>
              </div>
            </div>
          </div>
        </div>
        <div class="col-lg-6 d-none d-lg-flex auth-gradient-panel">
          <div class="auth-gradient-content text-white text-center px-4">
            <h2 class="fw-bold mb-3">Conectamos talento con oportunidades</h2>
            <p class="mb-0">
              Accede a tu perfil, explora ofertas, ofrece tu experiencia y encuentra la oportunidad profesional que encaja contigo.
            </p>
          </div>
        </div>

      </div>
    </section>
  </main>

  <script type="module" src="../js/pages/login.js"></script>
</body>
</html>
