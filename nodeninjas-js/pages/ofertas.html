<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Ofertas y Demandas - NodeNinjas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body class="bg-light">

    <div id="navbar-container"></div>

    <div class="container">
        <div class="row mb-4">
            <div class="col">
                <h2 class="fw-bold text-secondary">Gestión de Ofertas y Demandas</h2>
                <p class="text-muted">Alta y baja de publicaciones</p>
            </div>
        </div>

        <div class="card shadow-sm border-0 mb-5">
            <div class="card-header bg-white py-3">
                <h5 class="mb-0 text-primary fw-bold">Nueva Publicación</h5>
            </div>
            <div class="card-body">
                <form id="form-ofertas">
                    <div class="row g-3">
                        <div class="col-md-3">
                            <label class="form-label small fw-bold">Tipo</label>
                            <select id="tipo" class="form-select" required>
                                <option value="oferta">Oferta de Empleo</option>
                                <option value="demanda">Demanda Laboral</option>
                            </select>
                        </div>
                        <div class="col-md-9">
                            <label class="form-label small fw-bold">Título del puesto / Perfil</label>
                            <input type="text" id="titulo" class="form-control" placeholder="Ej: Desarrollador Java Junior" required>
                        </div>
                        <div class="col-md-5">
                            <label class="form-label small fw-bold">Empresa o Nombre</label>
                            <input type="text" id="entidad" class="form-control" placeholder="Nombre visible" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">Ubicación</label>
                            <input type="text" id="ubicacion" class="form-control" placeholder="Ciudad, País" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label small fw-bold">Modalidad</label>
                            <select id="modalidad" class="form-select">
                                <option value="Remoto">Remoto</option>
                                <option value="Presencial">Presencial</option>
                                <option value="Híbrido">Híbrido</option>
                            </select>
                        </div>
                        <div class="col-12 text-end mt-4">
                            <button type="reset" class="btn btn-light me-2">Limpiar</button>
                            <button type="submit" class="btn btn-primary px-4">Publicar Ahora</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-header bg-dark text-white py-3">
                <h5 class="mb-0">Publicaciones Actuales</h5>
            </div>
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Categoría</th>
                            <th>Título</th>
                            <th>Autor / Entidad</th>
                            <th>Ubicación</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-ofertas">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module" src="../js/pages/ofertas.js"></script>
</body>
</html>

<script type="module" src="../js/data/shared/navbar.js"></script>
<script type="module" src="../js/pages/ofertas.js"></script>
