<!DOCTYPE html>
<html lang="es">
<head>
    <!-- Configuración básica del documento -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Título de la pestaña del navegador -->
    <title>Dashboard principal | Plataforma Empleo</title>

    <!-- Bootstrap CSS para maquetación rápida y componentes visuales -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons para mostrar iconos -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Hoja de estilos propia del proyecto -->
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>

    <div id="navbar-container"></div>

    <!-- =========================================================
         CONTENIDO PRINCIPAL DEL DASHBOARD
    ========================================================== -->
    <main class="container-fluid px-4 py-4 dashboard-container">

        <!-- Cabecera principal del dashboard -->
        <section class="dashboard-hero">
            <div>
                <h1>Explora las ofertas publicadas</h1>
                <p>Gestiona ofertas y demandas de empleo en tiempo real</p>
            </div>

            <!-- Botón de acción principal -->
            <button id="btn-publicar" type="button">
                <i class="bi bi-plus-lg me-2"></i>Publicar anuncio
            </button>
        </section>

        <!-- =====================================================
             SECCIÓN DE OFERTAS DE EMPLEO
        ====================================================== -->
        <section class="dashboard-section">
            <h2 class="section-title oferta-line">Ofertas de empleo recientes</h2>

            <!-- Contenedor donde JS insertará las tarjetas de ofertas -->
            <div class="row g-4" id="contenedor-ofertas"></div>

            <!-- Botón para ir a la vista completa de ofertas -->
            <div class="section-footer">
                <button id="btn-ver-ofertas" type="button">Ver todas las ofertas</button>
            </div>
        </section>

        <!-- =====================================================
             SECCIÓN DE DEMANDAS DE EMPLEO
        ====================================================== -->
        <section class="dashboard-section">
            <h2 class="section-title demanda-line">Demandas de empleo recientes</h2>

            <!-- Contenedor donde JS insertará las tarjetas de demandas -->
            <div class="row g-4" id="contenedor-demandas"></div>

            <!-- Botón para ir a la vista completa de demandas -->
            <div class="section-footer">
                <button id="btn-ver-demandas" type="button" class="demanda-btn">Ver todas las demandas</button>
            </div>
        </section>

    </main>
    <script type="module" src="../js/data/shared/navbar.js"></script>
    <script type="module" src="../js/pages/dashboard.js"></script>
</body>
</html>
