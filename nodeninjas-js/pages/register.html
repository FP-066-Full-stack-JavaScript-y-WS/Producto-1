<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - Plataforma Empleo</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>

<body class="bg-auth">
  <main class="container py-5">
    <section class="auth-register-card bg-white shadow-sm mx-auto p-4 p-md-5">
      <div class="mb-4">
        <h1 class="h3 fw-bold">Registro</h1>
        <p class="text-muted mb-0">Crear nuevo usuario en la plataforma</p>
      </div>
      <div class="d-flex align-items-center gap-3 mb-4">
        <div class="auth-logo"></div>

        <div>
          <h2 class="h6 fw-bold mb-1">Nuevo usuario</h2>
          <p class="text-muted small mb-0">Completa el formulario con tus datos</p>
        </div>
      </div>

      <hr class="my-4">
      <form id="registerForm" novalidate>
        <div class="mb-3">
          <label for="nombre" class="form-label">Nombre completo *</label>
          <input
            type="text"
            id="nombre"
            class="form-control auth-input"
            placeholder="Ej: Juan Pérez García"
          >
        </div>
        <div class="mb-3">
          <label for="dni" class="form-label">DNI/NIE *</label>
          <input
            type="text"
            id="dni"
            class="form-control auth-input"
            placeholder="12345678A"
          >
        </div>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label for="email" class="form-label">Email *</label>
            <input
              type="email"
              id="email"
              class="form-control auth-input"
              placeholder="usuario@email.com"
            >
          </div>

          <div class="col-md-6 mb-3">
            <label for="telefono" class="form-label">Teléfono *</label>
            <input
              type="text"
              id="telefono"
              class="form-control auth-input"
              placeholder="612345678"
            >
          </div>
        </div>

        <hr class="my-4">
        <div class="row">
          <div class="col-md-6 mb-3">
            <label for="password" class="form-label">Contraseña *</label>
            <input
              type="password"
              id="password"
              class="form-control auth-input"
              placeholder="Mínimo 8 caracteres"
            >
          </div>

          <div class="col-md-6 mb-3">
            <label for="confirmPassword" class="form-label">Confirmar contraseña *</label>
            <input
              type="password"
              id="confirmPassword"
              class="form-control auth-input"
              placeholder="Repite la contraseña"
            >
          </div>
        </div>

        <div id="registerMensaje" class="mb-3"></div>

        <div class="d-flex flex-column flex-md-row gap-3">
          <button type="submit" class="btn btn-auth-gradient flex-grow-1 ">
            Crear usuario
          </button>
          <a href="./login.html" class="btn btn-light border px-4">
            Cancelar
          </a>
        </div>
      </form>
    </section>
  </main>

  <script type="module" src="../js/pages/register.js"></script>
</body>
</html>
